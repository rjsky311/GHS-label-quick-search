server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Security response headers ──────────────────────────────
    # These are the HTTP-header-level protections that cannot be set
    # via <meta> tags. The index.html also carries a <meta> CSP for
    # directives that DO work via meta (default-src, script-src,
    # style-src, connect-src, img-src, etc.).
    #
    # X-Content-Type-Options:  prevent MIME-type sniffing
    # X-Frame-Options:         legacy framing protection (CSP
    #                          frame-ancestors supersedes it but
    #                          older browsers still need this)
    # Content-Security-Policy: ONLY the frame-ancestors directive,
    #                          because the full policy is in the HTML
    #                          meta tag and maintaining two copies
    #                          would be error-prone. frame-ancestors
    #                          is the one directive that meta cannot
    #                          enforce.
    # Referrer-Policy:         defence-in-depth (meta also sets it)
    # Permissions-Policy:      disable APIs this app never uses
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Handle React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers inside location blocks that use
        # add_header — nginx clears inherited add_header directives
        # when a nested block defines its own.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    }
}
