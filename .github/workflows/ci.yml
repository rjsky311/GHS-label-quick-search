name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

      # Informational only: we want visibility on production
      # dependency advisories without blocking every change while the
      # remaining transitive packages are reviewed.
      - name: Audit production dependencies (informational)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile server.py

      - name: Run tests
        run: python -m pytest -v

      # pip-audit surfaces any CVE against the pinned requirements.
      # Informational for now. Known baseline issues will be handled
      # in the FastAPI dependency refresh follow-up.
      - name: Audit Python dependencies (informational)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
