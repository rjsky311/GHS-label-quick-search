name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npx craco test --watchAll=false

      - name: Build
        run: npm run build

      # Dependency vulnerability scan (production deps only).
      # `continue-on-error` keeps this informational — the CRA
      # toolchain (react-scripts) still pulls transitive packages
      # with known advisories that require a framework migration to
      # fully clear. We want visibility on every PR; we do not want
      # to block the pipeline on that pre-existing debt.
      - name: Audit production dependencies (informational)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile server.py

      - name: Run tests
        run: python -m pytest test_name_search.py -v

      # pip-audit surfaces any CVE against the pinned requirements.
      # Informational for now — known baseline as of 1.7.0:
      #   - starlette       0.37.2 → 0.40.0 / 0.47.2
      #   - python-multipart 0.0.21 → 0.0.22
      #   - pytest          8.3.4 → 9.0.3 (dev/test only)
      # These will be addressed in a follow-up that also bumps FastAPI.
      - name: Audit Python dependencies (informational)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
