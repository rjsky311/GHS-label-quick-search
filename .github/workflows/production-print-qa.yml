name: Production Print QA

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Production QA layer to run
        required: true
        default: product
        type: choice
        options:
          - product
          - smoke
          - primary
          - compact
          - multi-chemical
          - prepared
          - batch
          - full
          - all
      production_url:
        description: Frontend production URL
        required: false
        default: https://ghs-frontend.zeabur.app/
        type: string
  schedule:
    - cron: "0 20 * * 1"

permissions:
  contents: read

concurrency:
  group: production-print-qa-${{ github.event_name }}-${{ github.event.inputs.mode || 'scheduled-product' }}
  cancel-in-progress: false

jobs:
  production-print-qa:
    name: Production print QA
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend
    env:
      PRINT_QA_HEADLESS: "1"
      PRINT_QA_PRODUCTION_URL: ${{ github.event.inputs.production_url || 'https://ghs-frontend.zeabur.app/' }}
      PRINT_QA_SUMMARY_REPORT_PATH: build/production-print-qa-summary.json

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Chrome executable
        run: |
          google-chrome --version || google-chrome-stable --version || chromium --version

      - name: Run selected production print QA
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.mode || 'product' }}"
          echo "Running production print QA mode: ${MODE}"
          case "${MODE}" in
            product)
              npm run qa:production-product
              ;;
            smoke)
              npm run qa:production-smoke
              ;;
            primary)
              npm run qa:production-primary
              ;;
            compact)
              npm run qa:production-compact
              ;;
            multi-chemical)
              npm run qa:production-multi-chemical
              ;;
            prepared)
              npm run qa:production-bundle
              npm run qa:production-prepared
              npm run qa:production-summary
              ;;
            batch)
              npm run qa:production-bundle
              npm run qa:production-batch-print
              npm run qa:production-summary
              ;;
            full)
              npm run qa:production-print
              ;;
            all)
              npm run qa:production-print
              npm run qa:production-prepared
              npm run qa:production-summary
              ;;
            *)
              echo "Unknown production print QA mode: ${MODE}" >&2
              exit 2
              ;;
          esac

      - name: Generate physical print validation plan
        if: always()
        run: |
          set -euo pipefail
          if [ -f build/print-qa-report.json ]; then
            npm run qa:physical-print-plan
          else
            echo "Skipping physical print validation plan; build/print-qa-report.json was not generated for this mode."
          fi

      - name: Write production QA summary
        if: always()
        run: npm run qa:production-summary || true

      - name: Add job summary
        if: always()
        run: |
          MODE="${{ github.event.inputs.mode || 'product' }}"
          node <<'NODE'
          const fs = require("fs");
          const p = "build/production-print-qa-summary.json";
          const r = fs.existsSync(p) ? JSON.parse(fs.readFileSync(p, "utf8")) : {};
          const blocks = Array.isArray(r.productBlocks) ? r.productBlocks : [];
          const failedBlocks = Array.isArray(r.summary?.failedProductBlocks)
            ? r.summary.failedProductBlocks
            : [];
          const lines = [
            "## Production Print QA",
            "",
            `Mode: ${process.env.MODE}`,
            `OK: ${String(r.ok ?? "unknown")}`,
            `Present reports: ${String(r.summary?.presentReports ?? 0)}`,
            `Failed reports: ${String(r.summary?.failedReports ?? 0)}`,
            `Failed product blocks: ${failedBlocks.length ? failedBlocks.join(", ") : "none"}`,
            "",
          ];
          if (blocks.length) {
            lines.push("| Product block | Status |", "| --- | --- |");
            for (const block of blocks) {
              lines.push(`| ${block.name || block.id} | ${block.ok ? "pass" : "fail"} |`);
            }
            lines.push("");
          }
          lines.push(
            "Artifact includes JSON reports, preview screenshots, print HTML artifacts, generated PDFs, and the physical print validation plan when present.",
          );
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join("\n")}\n`);
          NODE
        env:
          MODE: ${{ github.event.inputs.mode || 'product' }}

      - name: Upload production QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-print-qa-${{ github.event.inputs.mode || 'scheduled-product' }}-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            frontend/build/*.json
            frontend/build/physical-print-validation-plan.md
            frontend/build/production-*-screenshots/**
            frontend/build/print-html-artifacts/**
            frontend/build/print-pdf-artifacts/**
