name: Production Print QA

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Production QA layer to run
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - primary
          - compact
          - multi-chemical
          - prepared
          - full
          - all
      production_url:
        description: Frontend production URL
        required: false
        default: https://ghs-frontend.zeabur.app/
        type: string
  schedule:
    - cron: "0 20 * * 1"

permissions:
  contents: read

concurrency:
  group: production-print-qa-${{ github.event_name }}-${{ github.event.inputs.mode || 'scheduled-smoke' }}
  cancel-in-progress: false

jobs:
  production-print-qa:
    name: Production print QA
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend
    env:
      PRINT_QA_HEADLESS: "1"
      PRINT_QA_PRODUCTION_URL: ${{ github.event.inputs.production_url || 'https://ghs-frontend.zeabur.app/' }}
      PRINT_QA_SUMMARY_REPORT_PATH: build/production-print-qa-summary.json

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Chrome executable
        run: |
          google-chrome --version || google-chrome-stable --version || chromium --version

      - name: Run selected production print QA
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.mode || 'smoke' }}"
          echo "Running production print QA mode: ${MODE}"
          case "${MODE}" in
            smoke)
              npm run qa:production-smoke
              ;;
            primary)
              npm run qa:production-primary
              ;;
            compact)
              npm run qa:production-compact
              ;;
            multi-chemical)
              npm run qa:production-multi-chemical
              ;;
            prepared)
              npm run qa:production-bundle
              npm run qa:production-prepared
              npm run qa:production-summary
              ;;
            full)
              npm run qa:production-print
              ;;
            all)
              npm run qa:production-print
              npm run qa:production-prepared
              npm run qa:production-summary
              ;;
            *)
              echo "Unknown production print QA mode: ${MODE}" >&2
              exit 2
              ;;
          esac

      - name: Write production QA summary
        if: always()
        run: npm run qa:production-summary || true

      - name: Add job summary
        if: always()
        run: |
          MODE="${{ github.event.inputs.mode || 'smoke' }}"
          node -e "const fs=require('fs'); const p='build/production-print-qa-summary.json'; const r=fs.existsSync(p) ? JSON.parse(fs.readFileSync(p,'utf8')) : {}; const lines=['## Production Print QA','', 'Mode: ' + process.env.MODE, 'OK: ' + String(r.ok ?? 'unknown'), 'Present reports: ' + String(r.summary?.presentReports ?? 0), 'Failed reports: ' + String(r.summary?.failedReports ?? 0), '', 'Artifact includes JSON reports, preview screenshots, print HTML artifacts, and generated PDFs when present.']; fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');"
        env:
          MODE: ${{ github.event.inputs.mode || 'smoke' }}

      - name: Upload production QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-print-qa-${{ github.event.inputs.mode || 'scheduled-smoke' }}-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            frontend/build/*.json
            frontend/build/production-*-screenshots/**
            frontend/build/print-html-artifacts/**
            frontend/build/print-pdf-artifacts/**
