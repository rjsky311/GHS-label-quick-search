# Zeabur deployment configuration for GHS Label Quick Search

services:
  - name: backend
    type: docker
    context: ./backend
    dockerfile: Dockerfile
    ports:
      - 8001
    env:
      # Default to the production frontend only. Override CORS_ORIGINS
      # with an explicit comma-separated list for multi-origin deploys.
      # `*` is rejected at runtime because it is unsafe for a public API.
      - CORS_ORIGINS=${CORS_ORIGINS:-https://ghs-frontend.zeabur.app}
    healthcheck:
      path: /api/health
      port: 8001

  - name: frontend
    type: static
    build:
      command: npm ci && npm run build
      output: build
    context: ./frontend
    env:
      - VITE_BACKEND_URL=${BACKEND_URL}
